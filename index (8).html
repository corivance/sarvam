  @layer components {

  }
  html, body, #root { height: 100%; }
  body { background: #F2F5F2; }

/* ============================ Helpers ============================ */
const cx = (...a) => a.filter(Boolean).join(" ");
const fmtDate = (d) => d ? new Date(d).toLocaleDateString(undefined,{month:"short",day:"numeric",year:"numeric"}) : "";
const fmtWhen = (d) => d ? new Date(d).toLocaleString(undefined,{month:"short",day:"numeric",hour:"numeric",minute:"2-digit"}) : "";
const arr = (v) => Array.isArray(v) ? v : [];
const splitList = (s) => String(s||"").split(/[,;]+/).map(x=>x.trim()).filter(Boolean);
const tri = (v) => v === true ? "Yes" : v === false ? "No" : "—";
const checklistProgress = (f, items) => {
  const total = items.length;
  const ck = f.checklist || {};
  const done = items.reduce((n,i)=> n + (ck[i.id] ? 1 : 0), 0);
  return { done, total };
};

function hexA(hex, a){ // hex + alpha -> rgba
  const n = parseInt(hex.slice(1),16);
  return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`;
}

/* ============================ Tiny UI atoms ============================ */
function StageChip({ stage, className }){
  const c = STAGE_COLOR[stage] || "#6B7280";
  return (
    React.createElement('span', { className: cx("chip", className), style: {background:hexA(c,0.12), color:c},}
      , React.createElement('span', { className: "h-1.5 w-1.5 rounded-full"  , style: {background:c},} )
      , stage
    )
  );
}
function Tag({ children }){
  return React.createElement('span', { className: "chip bg-paper text-muted font-mono"   ,}, children);
}
function Avatar({ name, size=36 }){
  const initials = (name||"?").trim().split(/\s+/).slice(0,2).map(s=>s[0]||"").join("").toUpperCase() || "?";
  return (
    React.createElement('span', { className: "inline-flex shrink-0 items-center justify-center rounded-full bg-brand-soft font-semibold text-brand"       ,
      style: { width:size, height:size, fontSize:size*0.38 }, 'aria-hidden': "true",}, initials)
  );
}
function Stars({ value }){
  if(!value) return React.createElement('span', { className: "text-muted text-xs" ,}, "—");
  return React.createElement('span', { className: "text-amber-500 text-xs tracking-tight"  ,}, "★".repeat(value), React.createElement('span', { className: "text-line",}, "★".repeat(5-value)));
}
function Field({ label, children, hint }){
  return (
    React.createElement('label', { className: "block",}
      , React.createElement('span', { className: "lbl",}, label)
      , children
      , hint && React.createElement('span', { className: "mt-1 block text-[11px] text-muted"   ,}, hint)
    )
  );
}
function Toggle({ on, onClick, children }){
  return (
    React.createElement('button', { type: "button", onClick: onClick,
      className: cx("chip border transition", on ? "border-brand bg-brand-soft text-brand" : "border-line bg-white text-muted hover:border-muted/40"),}
      , on && React.createElement('span', null, "✓"), children
    )
  );
}

function PageHeader({ title, subtitle, actions }){
  return (
    React.createElement('div', { className: "mb-5 flex flex-wrap items-center justify-between gap-3"     ,}
      , React.createElement('div', { className: "flex items-start gap-2.5"  ,}
        , React.createElement('img', { src: ICON_URI, alt: "", 'aria-hidden': "true", className: "mt-0.5 h-6 w-6 shrink-0"   , draggable: "false",} )
        , React.createElement('div', null
          , React.createElement('h1', { className: "text-2xl font-bold tracking-tight text-ink"   ,}, title)

}
function ChecklistPill({ f, items }){
  if(!items.length) return null;
  const { done, total } = checklistProgress(f, items);
  const complete = done === total;
  return (
    React.createElement('span', { className: cx("chip font-mono", complete ? "bg-green-50 text-green-700" : "bg-paper text-muted"),
      title: `${done} of ${total} checklist items done`,}
      , React.createElement('span', null, complete ? "✓" : "☑"), done, "/", total
    )
  );
}

/* ============================ Modal shell ============================ */
function Modal({ open, onClose, title, subtitle, children, footer, wide }){
  useEffect(()=>{
    if(!open) return;
    const h = (e)=>{ if(e.key === "Escape") onClose(); };
    window.addEventListener("keydown", h);
    document.body.style.overflow = "hidden";
    return ()=>{ window.removeEventListener("keydown", h); document.body.style.overflow = ""; };
  },[open,onClose]);
  if(!open) return null;
  return (
    React.createElement('div', { className: "fixed inset-0 z-50 flex items-end sm:items-center justify-center bg-ink/40 p-0 sm:p-4"         , onMouseDown: onClose,}
      , React.createElement('div', { onMouseDown: (e)=>e.stopPropagation(),
        className: cx("flex max-h-[94vh] w-full flex-col overflow-hidden rounded-t-2xl sm:rounded-2xl bg-paper shadow-2xl", wide ? "sm:max-w-4xl" : "sm:max-w-2xl"),}
        , React.createElement('div', { className: "flex items-start justify-between gap-3 border-b border-line bg-white px-5 py-4"        ,}
          , React.createElement('div', { className: "min-w-0",}
            , React.createElement('h2', { className: "truncate text-lg font-bold text-ink"   ,}, title)
            , subtitle && React.createElement('p', { className: "truncate text-sm text-muted"  ,}, subtitle)
          )
          , React.createElement('button', { onClick: onClose, className: "rounded-lg p-1.5 text-muted hover:bg-paper"   , 'aria-label': "Close",}, "✕")
        )
        , React.createElement('div', { className: "flex-1 overflow-y-auto px-5 py-5"   ,}, children)
        , footer && React.createElement('div', { className: "flex items-center justify-end gap-2 border-t border-line bg-white px-5 py-3"        ,}, footer)
      )
    )
  );
}

/* ============================ Comment thread ============================ */
function CommentThread({ items, onAdd, onDelete, placeholder }){
  const [text,setText] = useState("");
  const sorted = [...items].sort((a,b)=> new Date(b.created_at)-new Date(a.created_at));
  return (
    React.createElement('div', null
      , React.createElement('div', { className: "flex gap-2" ,}
        , React.createElement('input', { className: "inp", placeholder: placeholder||"Add a comment…", value: text,
          onChange: e=>setText(e.target.value),
          onKeyDown: e=>{ if(e.key==="Enter" && text.trim()){ onAdd(text.trim()); setText(""); } },} )
        , React.createElement('button', { className: "btn-soft shrink-0" , disabled: !text.trim(),
          onClick: ()=>{ if(text.trim()){ onAdd(text.trim()); setText(""); } },}, "Post")
      )
      , React.createElement('div', { className: "mt-3 space-y-2" ,}
        , sorted.length===0 && React.createElement('p', { className: "text-sm text-muted" ,}, "No comments yet."  )
        , sorted.map(c=>(
          React.createElement('div', { key: c.id, className: "group rounded-lg border border-line bg-white px-3 py-2"      ,}
            , React.createElement('div', { className: "flex items-start justify-between gap-2"   ,}
              , React.createElement('p', { className: "whitespace-pre-wrap text-sm text-ink"  ,}, c.body)
              , React.createElement('button', { onClick: ()=>onDelete(c.id), className: "opacity-0 group-hover:opacity-100 text-muted hover:text-red-600 text-xs"    ,}, "delete")
            )
            , React.createElement('p', { className: "mt-1 font-mono text-[11px] text-muted"   ,}, fmtWhen(c.created_at))
          )
        ))
      )
    )
  );
}

/* ============================ Login ============================ */
function Login(){
  const [email,setEmail] = useState("");
  const [pw,setPw] = useState("");
  const [err,setErr] = useState("");
  const [busy,setBusy] = useState(false);
  const submit = async () => {
    setErr(""); setBusy(true);
    const { error } = await sb.auth.signInWithPassword({ email, password: pw });
    if(error) setErr(error.message);
    setBusy(false);
  };
  return (
    React.createElement('div', { className: "flex min-h-full items-center justify-center bg-paper p-6"     ,}
      , React.createElement('div', { className: "w-full max-w-sm" ,}
        , React.createElement('div', { className: "mb-7 flex flex-col items-center gap-3"    ,}
          , React.createElement('img', { src: ICON_URI, alt: "Corivance", className: "h-12 w-12" , draggable: "false",} )
          , React.createElement('div', { className: "text-xl font-bold tracking-tight text-ink"   ,}, "Corivance " , React.createElement('span', { className: "text-brand",}, "Sarvam"))
        )
        , React.createElement('div', { className: "card p-7" ,}
          , React.createElement('h1', { className: "text-xl font-bold text-ink"  ,}, "Sign in" )
          , React.createElement('p', { className: "mt-1 text-sm text-muted"  ,}, "Access the freelancer pipeline."   )
          , React.createElement('div', { className: "mt-5 space-y-3" ,}
            , React.createElement(Field, { label: "Email",}, React.createElement('input', { className: "inp", type: "email", value: email, autoComplete: "username",
              onChange: e=>setEmail(e.target.value), onKeyDown: e=>e.key==="Enter"&&submit(),} ))
            , React.createElement(Field, { label: "Password",}, React.createElement('input', { className: "inp", type: "password", value: pw, autoComplete: "current-password",
              onChange: e=>setPw(e.target.value), onKeyDown: e=>e.key==="Enter"&&submit(),} ))
            , err && React.createElement('p', { className: "rounded-lg bg-red-50 px-3 py-2 text-sm text-red-600"     ,}, err)
            , React.createElement('button', { className: "btn-primary w-full" , onClick: submit, disabled: busy || !email || !pw,}
              , busy ? "Signing in…" : "Sign in"
            )
          )
        )
        , React.createElement('p', { className: "mt-4 text-center text-[11px] text-muted/70"   ,}, "Corivance · internal use only"    )
      )
    )
  );
}

function useDB(){

  const [checklistItems,setCI] = useState([]);
  const [tools,setT] = useState([]);
  const [clients,setCL] = useState([]);
  const [ready,setReady] = useState(false);
  const [error,setError] = useState("");

  const loadF  = useCallback(async()=>{ const {data,error}=await sb.from("freelancers").select("*").order("created_at",{ascending:false}); if(error)setError(error.message); else setF(data||[]); },[]);
  const loadP  = useCallback(async()=>{ const {data}=await sb.from("projects").select("*").order("created_at",{ascending:false}); setP(data||[]); },[]);
  const loadA  = useCallback(async()=>{ const {data}=await sb.from("project_assignments").select("*").order("created_at"); setA(data||[]); },[]);
  const loadC  = useCallback(async()=>{ const {data}=await sb.from("comments").select("*").order("created_at"); setC(data||[]); },[]);
  const loadT  = useCallback(async()=>{ const {data}=await sb.from("tools").select("*").order("created_at",{ascending:false}); setT(data||[]); },[]);
  const loadCL = useCallback(async()=>{ const {data}=await sb.from("clients").select("*").order("created_at",{ascending:false}); setCL(data||[]); },[]);
  const loadOpt= useCallback(async()=>{
    const [w,s,c] = await Promise.all([
      sb.from("work_areas").select("*").order("sort_order").order("name"),
      sb.from("sub_specialties").select("*").order("sort_order").order("name"),
      sb.from("checklist_items").select("*").order("sort_order").order("id"),
    ]);
    setWA(w.data||[]); setSS(s.data||[]); setCI(c.data||[]);
  },[]);

  const loadAll = useCallback(async()=>{
    await Promise.all([loadF(),loadP(),loadA(),loadC(),loadOpt(),loadT(),loadCL()]);
    setReady(true);
  },[loadF,loadP,loadA,loadC,loadOpt,loadT,loadCL]);

  useEffect(()=>{ loadAll(); },[loadAll]);

  const api = useMemo(()=>({
    freelancers, projects, assignments, comments, workAreas, subSpecialties, checklistItems, tools, clients, ready, error,

    saveFreelancer: async (id, payload) => {
      if(id){ const {data}=await sb.from("freelancers").update(payload).eq("id",id).select().single(); }
      else  { const {data}=await sb.from("freelancers").insert(payload).select().single(); }
      await loadF(); return true;
    },
    deleteFreelancer: async (id) => { await sb.from("freelancers").delete().eq("id",id); await Promise.all([loadF(),loadA(),loadC()]); },
    setStage: async (id, stage) => {
      setF(prev=>prev.map(f=>f.id===id?{...f,stage}:f)); // optimistic
      await sb.from("freelancers").update({stage}).eq("id",id); loadF();
    },

    createProject: async (payload) => { const {data}=await sb.from("projects").insert(payload).select().single(); await loadP(); return data; },
    saveProject: async (id, payload) => { if(id) await sb.from("projects").update(payload).eq("id",id); else await sb.from("projects").insert(payload); await loadP(); },
    deleteProject: async (id) => { await sb.from("projects").delete().eq("id",id); await Promise.all([loadP(),loadA(),loadC()]); },

    assign: async (project_id, freelancer_id, role) => { await sb.from("project_assignments").insert({project_id,freelancer_id,role}); await loadA(); },
    unassign: async (id) => { await sb.from("project_assignments").delete().eq("id",id); await Promise.all([loadA(),loadC()]); },
    updateAssignmentRole: async (id, role) => { await sb.from("project_assignments").update({role}).eq("id",id); await loadA(); },

    addComment: async (payload) => { await sb.from("comments").insert(payload); await loadC(); },
    deleteComment: async (id) => { await sb.from("comments").delete().eq("id",id); await loadC(); },

    addWorkArea: async (name) => { await sb.from("work_areas").insert({name}); await loadOpt(); },
    addSubSpecialty: async (work_area,name) => { await sb.from("sub_specialties").insert({work_area,name}); await loadOpt(); },
    addChecklistItem: async (label) => { await sb.from("checklist_items").insert({label}); await loadOpt(); },
    removeOption: async (table,id) => { await sb.from(table).delete().eq("id",id); await loadOpt(); },

    saveTool:   async (id,payload) => { if(id) await sb.from("tools").update(payload).eq("id",id); else await sb.from("tools").insert(payload); await loadT(); },
    deleteTool: async (id) => { await sb.from("tools").delete().eq("id",id); await loadT(); },

    saveClient:   async (id,payload) => { if(id) await sb.from("clients").update(payload).eq("id",id); else await sb.from("clients").insert(payload); await loadCL(); },
    deleteClient: async (id) => { await sb.from("clients").delete().eq("id",id); await loadCL(); },

    reload: loadAll,
  }),[freelancers,projects,assignments,comments,workAreas,subSpecialties,checklistItems,tools,clients,ready,error,loadF,loadP,loadA,loadC,loadOpt,loadT,loadCL,loadAll]);

  return api;
}

/* ============================ Auth root ============================ */
function App(){
  if(!CONFIGURED) return React.createElement(SetupScreen, null );
  const [session,setSession] = useState(undefined);

  useEffect(()=>{
    sb.auth.getSession().then(({data})=> setSession(data.session));
    const { data:sub } = sb.auth.onAuthStateChange((_e, s)=> setSession(s));
    return ()=> sub.subscription.unsubscribe();
  },[]);

  if(session===undefined) return React.createElement('div', { className: "flex h-full items-center justify-center text-sm text-muted"     ,}, "Loading…");
  if(!session) return React.createElement(Login, null );
  return React.createElement(SignedIn, { session: session,} );
}
function SignedIn({ session }){
  const db = useDB();
  return React.createElement(Shell, { session: session, db: db,} );
}
